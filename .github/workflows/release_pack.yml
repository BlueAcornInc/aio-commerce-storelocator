name: Pack a Release

on:
  workflow_dispatch:
  release:
    types: [released]

jobs:
  pack:
    name: Pack Release
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 1
      matrix:
        node-version: ["20"]
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm install
        run: npm i
      - name: Setup CLI
        uses: adobe/aio-cli-setup-action@1.3.0
        with:
          os: ${{ matrix.os }}
          version: 10.x.x
      - name: Auth
        uses: adobe/aio-apps-action@3.3.0
        with:
          os: ${{ matrix.os }}
          command: oauth_sts
          CLIENTID: ${{ vars.CLIENTID_PROD }}
          CLIENTSECRET: ${{ secrets.CLIENTSECRET_PROD }}
          TECHNICALACCOUNTID: ${{ vars.TECHNICALACCID_PROD }}
          TECHNICALACCOUNTEMAIL: ${{ vars.TECHNICALACCEMAIL_PROD }}
          IMSORGID: ${{ vars.IMSORGID_PROD }}
          SCOPES: ${{ vars.SCOPES_PROD }}
      - name: Create .env for commerce lib
        run: |
          echo "AIO_COMMERCE_CONFIG_ENCRYPTION_KEY=${{ secrets.AIO_COMMERCE_CONFIG_ENCRYPTION_KEY_PROD }}" > .env
      - name: Pack App
        run: |
          aio app pack
          mv dist/app.zip dist/storelocator-${{ github.ref_name }}.zip
        env:
          AIO_RUNTIME_NAMESPACE: ${{ vars.AIO_RUNTIME_NAMESPACE_PROD }}
          AIO_PROJECT_ID: ${{ vars.AIO_PROJECT_ID_PROD }}
          AIO_PROJECT_NAME: ${{ vars.AIO_PROJECT_NAME_PROD }}
          AIO_PROJECT_ORG_ID: ${{ vars.AIO_PROJECT_ORG_ID_PROD }}
          AIO_PROJECT_ORG_IMS__ORG__ID: ${{ vars.IMSORGID_PROD }}
          AIO_PROJECT_WORKSPACE_ID: ${{ vars.AIO_PROJECT_WORKSPACE_ID_PROD }}
          AIO_PROJECT_WORKSPACE_NAME: ${{ vars.AIO_PROJECT_WORKSPACE_NAME_PROD }}
          # Note: AIO_PROJECT_WORKSPACE_DETAILS_SERVICES is intentionally omitted.
          # aio-lib-core-config stores env var values as raw strings (no JSON parsing),
          # but pack.js assumes .services is an array and calls .map() on it. When the
          # env var is absent, optional chaining safely returns undefined. This is a
          # known bug in @adobe/aio-cli-plugin-app pack.js (deploy code handles it
          # correctly via JSON.parse fallback in app-helper.js:444).
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/storelocator-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
